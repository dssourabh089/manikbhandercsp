<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikbhander CSP - Secure Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 460px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area svg {
            width: 60px;
            height: 60px;
            fill: #38bdf8;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.4));
        }
        h2 {
            margin-bottom: 30px;
            text-align: center;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px rgba(56, 189, 248, 0.3));
        }
        
        /* অ্যানালিটিক্স প্যানেল ও ডেট ফিল্টার ডিজাইন */
        .analytics-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }
        .analytics-title {
            font-size: 13px;
            font-weight: 700;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .toggle-view-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 0;
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .toggle-view-btn:hover { color: #38bdf8; background: transparent; box-shadow: none; }
        .date-filter-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .date-input-group { flex: 1; }
        .date-input-group label { font-size: 10px !important; margin-bottom: 4px !important; color: #64748b !important; }
        .date-input-group input[type="date"] { padding: 8px 10px; font-size: 13px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: #f8fafc; width: 100%; }
        .search-btn { width: auto; margin-top: 0; padding: 8px 15px; font-size: 13px; border-radius: 8px; background: #38bdf8; color: #0f172a; }
        .search-btn:hover { background: #0ea5e9; }
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .analytics-box { background: #0f172a; padding: 10px 12px; border-radius: 10px; border: 1px solid #1e293b; }
        .analytics-box.full-width { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; }
        .analytics-label { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 2px; }
        .analytics-value { font-size: 16px; font-weight: 700; color: #f8fafc; transition: filter 0.2s; }
        .analytics-value.blur-text { filter: blur(5px); user-select: none; }
        .val-deposit { color: #4ade80; }
        .val-withdraw { color: #f87171; }
        
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .required-star { color: #f87171; font-weight: bold; margin-left: 2px; }
        input { width: 100%; padding: 14px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; font-size: 15px; color: #f8fafc; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); background: #0f172a; }
        input::placeholder { color: #475569; }
        .input-row { display: flex; gap: 15px; }
        .input-row .form-group { flex: 1; }
        button { width: 100%; padding: 15px; background: #38bdf8; color: #0f172a; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; margin-top: 10px; letter-spacing: 0.5px; transition: all 0.2s ease; }
        button:hover { background: #0ea5e9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }
        .hidden { display: none !important; }
        .message { text-align: center; margin-top: 20px; font-size: 14px; font-weight: 600; padding: 12px; border-radius: 10px; }
        .status-loading { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); }
        .status-success { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
        .status-correction { color: #fbbf24; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
        .logout-btn-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-link { color: #f87171; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <div class="logo-area">
            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
        </div>
        <h2>Portal Login</h2>
        <div class="form-group">
            <label for="username">User ID</label>
            <input type="text" id="username" placeholder="Enter User ID" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" autocomplete="current-password">
        </div>
        <button id="login-btn" onclick="handleLogin()">LOGIN</button>
        <p id="login-error"></p>
    </div>

    <div id="form-box" class="hidden">
        <div class="logout-btn-container">
            <span style="color:#64748b; font-size:14px; font-weight:600;">Welcome,SHREYANS COMPUTER</span>
            <span class="logout-link" onclick="logout()">Logout →</span>
        </div>
         
        <h2> Manikbhander CSP Data Entry Portal</h2>

        <div class="analytics-panel">
            <div class="analytics-header">
                <span class="analytics-title">Custom Report</span>
                <span class="toggle-view-btn" onclick="toggleAnalyticsView()">
                    <span id="eye-icon">👁️</span> <span id="eye-text">Hide</span>
                </span>
            </div>
            
            <div class="date-filter-row">
                <div class="date-input-group">
                    <label>From Date</label>
                    <input type="date" id="from-date">
                </div>
                <div class="date-input-group">
                    <label>To Date</label>
                    <input type="date" id="to-date">
                </div>
                <button type="button" class="search-btn" onclick="loadCustomAnalytics()">Search</button>
            </div>

            <div class="analytics-grid">
                <div class="analytics-box">
                    <div class="analytics-label">Total Deposit</div>
                    <div id="today-deposit" class="analytics-value val-deposit">₹0</div>
                </div>
                <div class="analytics-box">
                    <div class="analytics-label">Total Withdrawal</div>
                    <div id="today-withdrawal" class="analytics-value val-withdraw">₹0</div>
                </div>
                <div class="analytics-box full-width">
                    <div class="analytics-label" style="margin-bottom:0;">Total Successful Txns</div>
                    <div id="today-txns" class="analytics-value" style="color:#38bdf8;">0</div>
                </div>
            </div>
        </div>
        
        <iframe name="hidden_iframe" id="hidden_iframe" class="hidden" onload="if(typeof iframe_loaded !== 'undefined') iframe_loaded();"></iframe>
        
        <form id="data-form" method="POST" target="hidden_iframe" onsubmit="handleSubmit(event)">
            
            <div class="form-group">
                <label for="aadhar_ac">Aadhar / AC Number <span class="required-star">*</span></label>
                <input type="text" id="aadhar_ac" name="aadhar_ac" required placeholder="Enter Aadhar or AC Number" autocomplete="off" oninput="liveCheckUser()">
            </div>

            <div class="form-group">
                <label for="name">Full Name <span class="required-star">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Sourabh Deb" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number<span class="required-star">*</span></label>
                <input type="tel" id="phone" name="phone" required placeholder="10-digit Mobile Number" autocomplete="tel">
            </div>

            <div class="input-row">
                <div class="form-group">
                    <label for="deposit">Deposit (₹) <span class="required-star">*</span></label>
                    <input type="number" id="deposit" name="deposit" min="0" placeholder="Amount" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="withdrawal">Withdrawal (₹) <span class="required-star">*</span></label>
                    <input type="number" id="withdrawal" name="withdrawal" min="0" placeholder="Amount" autocomplete="off">
                </div>
            </div>

            <button type="submit" id="submit-btn">SUBMIT TO SHEET</button>
        </form>
        <div id="msg" class="message hidden"></div>
    </div>
</div>

<script>
    var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyc2MBl9f6vGk6KRo2dorWzcpDDiSFBYvVvF3puLphuFBtTs46HLBryOgNT5kUV0ktBYQ/exec"; 
    
    var timeoutHandler = null;
    var INACTIVITY_LIMIT = 30 * 60 * 1000; 
    var liveTimeout = null;
    var isSubmitted = false;

    window.onload = function() {
        if (sessionStorage.getItem("sessionActive") === "true") {
            var lastActivity = parseInt(sessionStorage.getItem("lastActivityTime"), 10);
            if (new Date().getTime() - lastActivity > INACTIVITY_LIMIT) {
                logout();
            } else {
                showFormBox();
                startInactivityTimer();
                setDefaultDates();
            }
        }
        if(localStorage.getItem("analyticsHidden") === "true") {
            applyHideState(true);
        }
    };

    function handleLogin() {
        var uId = document.getElementById('username').value.trim();
        var pass = document.getElementById('password').value;
        var loginBtn = document.getElementById('login-btn');
        var errorDiv = document.getElementById('login-error');

        if (!uId || !pass) {
            errorDiv.innerText = "Please enter both User ID and Password!";
            return;
        }

        loginBtn.innerText = "VERIFYING...";
        loginBtn.disabled = true;
        errorDiv.innerText = "";

        removeJsonpScript("jsonp-login");
        var script = document.createElement("script");
        script.id = "jsonp-login";
        script.src = SCRIPT_URL + "?action=loginCSP&uId=" + encodeURIComponent(uId) + "&pass=" + encodeURIComponent(pass) + "&callback=onLoginVerified&_ts=" + new Date().getTime();
        document.body.appendChild(script);
    }

    window.onLoginVerified = function(data) {
        var loginBtn = document.getElementById('login-btn');
        var errorDiv = document.getElementById('login-error');
        
        loginBtn.innerText = "LOGIN";
        loginBtn.disabled = false;

        if (data && data.success) {
            sessionStorage.setItem("sessionActive", "true");
            sessionStorage.setItem("lastActivityTime", new Date().getTime().toString());
            showFormBox();
            startInactivityTimer();
            setDefaultDates();
        } else {
            errorDiv.innerText = "Invalid User ID or Password!";
        }
        removeJsonpScript("jsonp-login");
    };

    // মিসিং ফাংশনটি এখানে নিখুঁতভাবে যোগ করা হলো
    function showFormBox() {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('form-box').classList.remove('hidden');
    }

    function logout() {
        sessionStorage.clear();
        clearTimeout(timeoutHandler);
        clearTimeout(liveTimeout);
        document.getElementById('login-box').classList.remove('hidden');
        document.getElementById('form-box').classList.add('hidden');
        document.getElementById('data-form').reset();
        document.getElementById('msg').classList.add('hidden');
    }

    function startInactivityTimer() {
        resetTimer();
        window.onmousemove = resetTimer;
        window.onkeypress = resetTimer;
    }

    function resetTimer() {
        if (sessionStorage.getItem("sessionActive") === "true") {
            sessionStorage.setItem("lastActivityTime", new Date().getTime().toString());
            clearTimeout(timeoutHandler);
            timeoutHandler = setTimeout(logout, INACTIVITY_LIMIT);
        }
    }

    function setDefaultDates() {
        var today = new Date().toISOString().split('T')[0];
        document.getElementById('from-date').value = today;
        document.getElementById('to-date').value = today;
        loadCustomAnalytics();
    }

    function loadCustomAnalytics() {
        var fromDate = document.getElementById('from-date').value;
        var toDate = document.getElementById('to-date').value;
        if(!fromDate || !toDate) return;

        removeJsonpScript("jsonp-analytics");
        var script = document.createElement("script");
        script.id = "jsonp-analytics";
        script.src = SCRIPT_URL + "?action=getAnalytics&from=" + fromDate + "&to=" + toDate + "&callback=onAnalyticsFetched&_ts=" + new Date().getTime();
        document.body.appendChild(script);
    }

    window.onAnalyticsFetched = function(data) {
        if(data && data.success) {
            document.getElementById('today-deposit').innerText = "₹" + data.totalDeposit;
            document.getElementById('today-withdrawal').innerText = "₹" + data.totalWithdrawal;
            document.getElementById('today-txns').innerText = data.totalTxns;
        }
        removeJsonpScript("jsonp-analytics");
    };

    function toggleAnalyticsView() {
        var isHidden = localStorage.getItem("analyticsHidden") === "true";
        applyHideState(!isHidden);
    }

    function applyHideState(hide) {
        var vals = document.querySelectorAll('.analytics-value');
        vals.forEach(function(val) {
            if(hide) val.classList.add('blur-text');
            else val.classList.remove('blur-text');
        });
        document.getElementById('eye-icon').innerText = hide ? "🙈" : "👁️";
        document.getElementById('eye-text').innerText = hide ? "Show" : "Hide";
        localStorage.setItem("analyticsHidden", hide ? "true" : "false");
    }

    function liveCheckUser() {
        var aadharVal = document.getElementById('aadhar_ac').value.trim();
        var msgDiv = document.getElementById('msg');
        if (aadharVal.length < 4) {
            msgDiv.classList.add('hidden');
            removeJsonpScript("jsonp-fetch");
            return;
        }
        clearTimeout(liveTimeout);
        liveTimeout = setTimeout(function() {
            removeJsonpScript("jsonp-fetch");
            var script = document.createElement("script");
            script.id = "jsonp-fetch";
            script.src = SCRIPT_URL + "?action=fetchUser&aadhar_ac=" + encodeURIComponent(aadharVal) + "&callback=onUserDataFetched&_ts=" + new Date().getTime();
            document.body.appendChild(script);
        }, 300);
    }

    window.onUserDataFetched = function(data) {
        var msgDiv = document.getElementById('msg');
        if (data && data.success && data.user) {
            document.getElementById('name').value = data.user.name || "";
            document.getElementById('phone').value = data.user.phone || "";
            msgDiv.className = "message status-correction";
            msgDiv.innerText = "Existing record found! Fields auto-filled.";
            msgDiv.classList.remove('hidden');
        } else {
            msgDiv.classList.add('hidden');
        }
        removeJsonpScript("jsonp-fetch");
    };

    function handleSubmit(e) {
        e.preventDefault();
        var msgDiv = document.getElementById('msg');
        var submitBtn = document.getElementById('submit-btn');
        var form = document.getElementById('data-form');
        
        var depositVal = document.getElementById('deposit').value.trim();
        var withdrawalVal = document.getElementById('withdrawal').value.trim();

        if (!depositVal && !withdrawalVal) {
            msgDiv.className = "message status-correction"; 
            msgDiv.innerText = "Validation Warning: Please fill either Deposit or Withdrawal!";
            msgDiv.classList.remove('hidden');
            return;
        }

        if (depositVal && withdrawalVal) {
            msgDiv.className = "message status-loading"; 
            msgDiv.style.color = "#f87171";
            msgDiv.style.background = "rgba(248, 113, 113, 0.1)";
            msgDiv.style.border = "1px solid rgba(248, 113, 113, 0.2)";
            msgDiv.innerText = "Error: Please fill only ONE field (Deposit OR Withdrawal)!";
            msgDiv.classList.remove('hidden');
            return;
        }

        msgDiv.style.color = ""; msgDiv.style.background = ""; msgDiv.style.border = "";
        msgDiv.className = "message status-loading";
        msgDiv.innerText = "Synchronizing data with Google Sheets...";
        msgDiv.classList.remove('hidden');

        submitBtn.innerText = "SYNCHRONIZING...";
        submitBtn.disabled = true;

        form.action = SCRIPT_URL + "?action=submitForm";
        isSubmitted = true;
        form.submit();
    }

    function iframe_loaded() {
        if (!isSubmitted) return;
        var msgDiv = document.getElementById('msg');
        var submitBtn = document.getElementById('submit-btn');
        
        msgDiv.className = "message status-success";
        msgDiv.innerText = "Data successfully synchronized with Google Sheets!";
        msgDiv.classList.remove('hidden');
        
        document.getElementById('data-form').reset();
        submitBtn.innerText = "SUBMIT TO SHEET";
        submitBtn.disabled = false;
        isSubmitted = false;
        
        setTimeout(loadCustomAnalytics, 1000);
    }

    function removeJsonpScript(id) {
        var script = document.getElementById(id);
        if (script) script.parentNode.removeChild(script);
    }
</script>

</body>
</html>
